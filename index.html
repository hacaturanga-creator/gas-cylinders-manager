<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление баллонами газов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .hidden { display: none !important; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; }
        .modal h2 { margin-bottom: 20px; color: #2c3e50; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3498db; color: white; width: 100%; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-block { width: 100%; margin-bottom: 10px; }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        
        .header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; }
        
        .container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 250px; background: white; padding: 20px; border-right: 1px solid #ddd; }
        .sidebar-section { margin-bottom: 25px; }
        .sidebar-section h3 { margin-bottom: 15px; color: #2c3e50; font-size: 16px; }
        
        .stats { background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-value { font-weight: bold; }
        
        .main-content { flex: 1; padding: 20px; overflow: auto; }
        .workspace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .storage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .storage-item { background: white; border: 2px solid #3498db; border-radius: 8px; padding: 15px; }
        .storage-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .storage-header h4 { color: #2c3e50; }
        
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 10px; }
        .slot { min-height: 80px; border: 2px solid #e0e0e0; border-radius: 6px; padding: 5px; background: #f8f9fa; cursor: pointer; }
        .slot.empty { display: flex; align-items: center; justify-content: center; border: 2px dashed #bdc3c7; }
        .slot.empty::after { content: '+'; font-size: 24px; color: #95a5a6; }
        
        .cylinder { background: white; border-radius: 6px; padding: 8px; border-left: 4px solid; }
        .cylinder.oxygen { border-left-color: #e74c3c; }
        .cylinder.nitrogen { border-left-color: #3498db; }
        .cylinder.argon { border-left-color: #9b59b6; }
        .cylinder.helium { border-left-color: #2ecc71; }
        .cylinder-number { font-weight: bold; font-size: 12px; }
        .cylinder-status { font-size: 10px; padding: 2px 6px; border-radius: 10px; display: inline-block; }
        .cylinder-status.full { background: #d5f4e6; color: #27ae60; }
        .cylinder-status.empty { background: #fadbd8; color: #e74c3c; }
        .cylinder-gas { font-size: 11px; color: #666; margin: 3px 0; }
        .cylinder-actions { display: flex; gap: 5px; margin-top: 5px; }
        
        .free-cylinders { background: white; border: 2px solid #f39c12; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .free-cylinders-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .free-cylinder { background: white; padding: 8px; border-radius: 6px; border-left: 4px solid; min-width: 120px; }
        
        .archive-section { background: white; border: 2px solid #95a5a6; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .archive-toggle { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .archive-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .archive-content.expanded { max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .archive-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .archive-table th, .archive-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        
        .badge { background: #3498db; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .admin-only { display: none; }
        .admin-only.show { display: inline-block; }
        .error-message { background: #fadbd8; color: #e74c3c; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .notification { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white; padding: 12px 20px; border-radius: 6px; z-index: 1001; }
        .notification.error { background: #e74c3c; }
        
        .user-menu { position: relative; display: inline-block; }
        .user-menu-btn { background: #34495e; padding: 8px 12px; border-radius: 20px; cursor: pointer; display: flex; gap: 8px; align-items: center; }
        .user-menu-dropdown { position: absolute; top: 100%; right: 0; background: white; min-width: 180px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; z-index: 1000; }
        .user-menu-dropdown.show { display: block; }
        .user-menu-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-menu-item:hover { background: #f8f9fa; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- Модальное окно входа -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2>🔐 Управление баллонами газов</h2>
                <p style="color: #666;">Вход в систему</p>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button id="loginBtn" class="btn btn-primary">Войти</button>
            <button id="registerBtn" class="btn btn-secondary" style="margin-top: 10px;">Зарегистрироваться</button>
            <div id="loginError" class="error-message hidden"></div>
            <div id="firstAdminContainer" style="margin-top: 15px;"></div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app" class="hidden">
        <header class="header">
            <h1>🗲 Управление баллонами газов</h1>
            <div class="user-menu">
                <div class="user-menu-btn" id="userMenuBtn">
                    <span id="currentUserName">Пользователь</span>
                    <span>▼</span>
                </div>
                <div class="user-menu-dropdown" id="userMenuDropdown">
                    <div class="user-menu-item" onclick="App.logout()">🚪 Выйти</div>
                </div>
            </div>
        </header>

        <div class="container">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Управление</h3>
                    <button id="addCylinderBtn" class="btn btn-primary btn-block">+ Добавить баллон</button>
                    <button id="addStorageBtn" class="btn btn-primary btn-block">+ Добавить хранилище</button>
                </div>
                <div class="sidebar-section">
                    <h3>Статистика</h3>
                    <div class="stats">
                        <div class="stat-item"><span>Всего баллонов:</span><span id="totalCylinders">0</span></div>
                        <div class="stat-item"><span>Полные:</span><span id="fullCylinders">0</span></div>
                        <div class="stat-item"><span>Пустые:</span><span id="emptyCylinders">0</span></div>
                        <div class="stat-item"><span>Хранилищ:</span><span id="totalStorage">0</span></div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="workspace-header">
                    <h2>Рабочая область</h2>
                    <button id="refreshBtn" class="btn btn-small">🔄 Обновить</button>
                </div>

                <div id="storageContainer" class="storage-grid"></div>
                
                <div id="freeCylindersContainer" class="free-cylinders hidden">
                    <h3>📦 Свободные баллоны <span id="freeCylindersBadge" class="badge">0</span></h3>
                    <div id="freeCylindersList" class="free-cylinders-grid"></div>
                </div>

                <div id="emptyDatabase" style="text-align: center; padding: 50px;">
                    <h3>База данных пуста</h3>
                    <p>Добавьте хранилище для начала работы</p>
                    <button id="firstStorageBtn" class="btn btn-primary">+ Добавить хранилище</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyA0Guq1AuGZ1HnlQUeoEgrdC8peHc1Qkms",
            authDomain: "gas-cylinders-manager.firebaseapp.com",
            projectId: "gas-cylinders-manager",
            storageBucket: "gas-cylinders-manager.firebasestorage.app",
            messagingSenderId: "499434221546",
            appId: "1:499434221546:web:a2a37371ca297b316bcc93"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = {
            currentUser: null,
            storage: [],
            cylinders: [],

            async init() {
                console.log("App init");
                this.setupEventListeners();
                await this.checkForFirstAdmin();
                
                auth.onAuthStateChanged(async (user) => {
                    console.log("Auth state:", user ? user.email : "no user");
                    if (user) {
                        this.currentUser = user;
                        document.getElementById('currentUserName').innerText = user.email.split('@')[0];
                        document.getElementById('app').classList.remove('hidden');
                        document.getElementById('loginModal').classList.add('hidden');
                        await this.loadData();
                    } else {
                        document.getElementById('app').classList.add('hidden');
                        document.getElementById('loginModal').classList.remove('hidden');
                    }
                });
            },

            setupEventListeners() {
                document.getElementById('loginBtn').onclick = () => this.login();
                document.getElementById('registerBtn').onclick = () => this.register();
                document.getElementById('addCylinderBtn').onclick = () => this.showAddCylinder();
                document.getElementById('addStorageBtn').onclick = () => this.showAddStorage();
                document.getElementById('firstStorageBtn').onclick = () => this.showAddStorage();
                document.getElementById('refreshBtn').onclick = () => this.loadData();
                
                const userMenuBtn = document.getElementById('userMenuBtn');
                const dropdown = document.getElementById('userMenuDropdown');
                userMenuBtn.onclick = (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('show');
                };
                document.onclick = () => dropdown.classList.remove('show');
            },

            async checkForFirstAdmin() {
                try {
                    const usersSnap = await db.collection('users').limit(1).get();
                    if (usersSnap.empty) {
                        const btn = document.createElement('button');
                        btn.textContent = '👑 Создать администратора';
                        btn.className = 'btn btn-success';
                        btn.style.width = '100%';
                        btn.style.marginTop = '10px';
                        btn.onclick = () => this.createFirstAdmin();
                        document.getElementById('firstAdminContainer').appendChild(btn);
                    }
                } catch(e) {
                    console.log("Ошибка проверки:", e);
                }
            },

            async createFirstAdmin() {
                const email = prompt('Email администратора:', 'admin@system.com');
                const password = prompt('Пароль (мин. 6 символов):', '');
                if (!email || !password || password.length < 6) {
                    alert('Неверные данные');
                    return;
                }
                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(cred.user.uid).set({
                        email: email,
                        role: 'admin',
                        name: 'Администратор',
                        createdAt: new Date()
                    });
                    alert('Администратор создан! Теперь войдите.');
                    location.reload();
                } catch(e) {
                    alert('Ошибка: ' + e.message);
                }
            },

            async login() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorDiv = document.getElementById('loginError');
                
                if (!email || !password) {
                    errorDiv.innerText = 'Введите email и пароль';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                
                try {
                    errorDiv.classList.add('hidden');
                    await auth.signInWithEmailAndPassword(email, password);
                } catch(e) {
                    errorDiv.innerText = e.message;
                    errorDiv.classList.remove('hidden');
                }
            },

            async register() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorDiv = document.getElementById('loginError');
                
                if (!email || !password || password.length < 6) {
                    errorDiv.innerText = 'Пароль должен быть не менее 6 символов';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                
                try {
                    errorDiv.classList.add('hidden');
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(cred.user.uid).set({
                        email: email,
                        role: 'user',
                        name: email.split('@')[0],
                        createdAt: new Date()
                    });
                    this.showNotification('Регистрация успешна!');
                } catch(e) {
                    errorDiv.innerText = e.message;
                    errorDiv.classList.remove('hidden');
                }
            },

            async logout() {
                await auth.signOut();
                this.showNotification('Вы вышли из системы');
            },

            async loadData() {
                try {
                    const storageSnap = await db.collection('storage').get();
                    this.storage = storageSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    const cylindersSnap = await db.collection('cylinders').where('archived', '==', false).get();
                    this.cylinders = cylindersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    this.renderWorkspace();
                    this.updateStats();
                } catch(e) {
                    console.error("Ошибка загрузки:", e);
                    this.showNotification('Ошибка загрузки данных', 'error');
                }
            },

            renderWorkspace() {
                const container = document.getElementById('storageContainer');
                const freeContainer = document.getElementById('freeCylindersContainer');
                const emptyDb = document.getElementById('emptyDatabase');
                
                if (this.storage.length === 0) {
                    container.innerHTML = '';
                    freeContainer.classList.add('hidden');
                    emptyDb.classList.remove('hidden');
                    return;
                }
                
                emptyDb.classList.add('hidden');
                container.innerHTML = '';
                
                this.storage.forEach(storage => {
                    container.appendChild(this.createStorageElement(storage));
                });
                
                this.renderFreeCylinders();
            },

            createStorageElement(storage) {
                const div = document.createElement('div');
                div.className = 'storage-item';
                
                const cylindersInStorage = this.cylinders.filter(c => c.storageId === storage.id);
                const fullCount = cylindersInStorage.filter(c => c.status === 'Полный').length;
                const emptyCount = cylindersInStorage.filter(c => c.status === 'Пустой').length;
                
                div.innerHTML = `
                    <div class="storage-header">
                        <h4>${storage.name} (${storage.type})</h4>
                        <button class="btn btn-small" onclick="App.deleteStorage('${storage.id}')">🗑️</button>
                    </div>
                    <div style="font-size:12px;">Баллонов: ${cylindersInStorage.length}/${storage.capacity} | Полных: ${fullCount} | Пустых: ${emptyCount}</div>
                    <div class="slots-grid" id="slots-${storage.id}"></div>
                `;
                
                const slotsGrid = div.querySelector(`#slots-${storage.id}`);
                for (let i = 0; i < storage.capacity; i++) {
                    const slot = document.createElement('div');
                    const cylinder = cylindersInStorage.find(c => c.position === i);
                    
                    if (cylinder) {
                        slot.className = 'slot';
                        slot.innerHTML = this.createCylinderHTML(cylinder);
                    } else {
                        slot.className = 'slot empty';
                        slot.onclick = () => this.assignCylinderToSlot(storage.id, i);
                    }
                    slotsGrid.appendChild(slot);
                }
                return div;
            },

            createCylinderHTML(cylinder) {
                let gasClass = '';
                if (cylinder.gasType === 'Кислород') gasClass = 'oxygen';
                else if (cylinder.gasType === 'Азот') gasClass = 'nitrogen';
                else if (cylinder.gasType === 'Аргон') gasClass = 'argon';
                else if (cylinder.gasType === 'Гелий') gasClass = 'helium';
                
                return `
                    <div class="cylinder ${gasClass}">
                        <div class="cylinder-number">${cylinder.number}</div>
                        <div class="cylinder-status ${cylinder.status === 'Полный' ? 'full' : 'empty'}">${cylinder.status}</div>
                        <div class="cylinder-gas">${cylinder.gasType}</div>
                        <div class="cylinder-actions">
                            <button class="btn btn-small" onclick="event.stopPropagation(); App.toggleStatus('${cylinder.id}')">🔄</button>
                            <button class="btn btn-small" onclick="event.stopPropagation(); App.archiveCylinder('${cylinder.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            },

            renderFreeCylinders() {
                const free = this.cylinders.filter(c => !c.storageId);
                const container = document.getElementById('freeCylindersContainer');
                const list = document.getElementById('freeCylindersList');
                const badge = document.getElementById('freeCylindersBadge');
                
                if (free.length === 0) {
                    container.classList.add('hidden');
                    return;
                }
                
                container.classList.remove('hidden');
                badge.innerText = free.length;
                list.innerHTML = '';
                
                free.forEach(cyl => {
                    const div = document.createElement('div');
                    div.className = 'free-cylinder';
                    div.innerHTML = `
                        <strong>${cyl.number}</strong><br>
                        ${cyl.gasType}<br>
                        ${cyl.status}
                    `;
                    list.appendChild(div);
                });
            },

            async assignCylinderToSlot(storageId, position) {
                const freeCylinders = this.cylinders.filter(c => !c.storageId);
                if (freeCylinders.length === 0) {
                    this.showNotification('Нет свободных баллонов', 'error');
                    return;
                }
                
                const cylinder = freeCylinders[0];
                try {
                    await db.collection('cylinders').doc(cylinder.id).update({
                        storageId: storageId,
                        position: position
                    });
                    this.showNotification(`Баллон ${cylinder.number} добавлен в хранилище`);
                } catch(e) {
                    this.showNotification('Ошибка', 'error');
                }
            },

            async toggleStatus(cylinderId) {
                const cylinder = this.cylinders.find(c => c.id === cylinderId);
                if (!cylinder) return;
                
                const newStatus = cylinder.status === 'Полный' ? 'Пустой' : 'Полный';
                try {
                    await db.collection('cylinders').doc(cylinderId).update({ status: newStatus });
                    this.showNotification(`Статус изменен на ${newStatus}`);
                } catch(e) {
                    this.showNotification('Ошибка', 'error');
                }
            },

            async archiveCylinder(cylinderId) {
                if (!confirm('Переместить баллон в архив?')) return;
                try {
                    await db.collection('cylinders').doc(cylinderId).update({
                        archived: true,
                        storageId: null,
                        position: null
                    });
                    this.showNotification('Баллон архивирован');
                } catch(e) {
                    this.showNotification('Ошибка', 'error');
                }
            },

            async deleteStorage(storageId) {
                const cylindersIn = this.cylinders.filter(c => c.storageId === storageId);
                if (cylindersIn.length > 0) {
                    if (!confirm(`В хранилище ${cylindersIn.length} баллонов. Освободить их и удалить?`)) return;
                    for (const cyl of cylindersIn) {
                        await db.collection('cylinders').doc(cyl.id).update({ storageId: null, position: null });
                    }
                }
                await db.collection('storage').doc(storageId).delete();
                this.showNotification('Хранилище удалено');
            },

            async showAddCylinder() {
                const number = prompt('Номер баллона:', `Б-${Math.floor(Math.random()*9000+1000)}`);
                if (!number) return;
                
                const gasType = prompt('Тип газа (Кислород/Азот/Аргон/Гелий):', 'Кислород');
                if (!gasType) return;
                
                try {
                    await db.collection('cylinders').add({
                        number: number,
                        gasType: gasType,
                        status: 'Полный',
                        capacity: 40,
                        storageId: null,
                        position: null,
                        archived: false,
                        createdAt: new Date()
                    });
                    this.showNotification('Баллон добавлен');
                } catch(e) {
                    this.showNotification('Ошибка', 'error');
                }
            },

            async showAddStorage() {
                const name = prompt('Название хранилища:', 'Кабинет №1');
                if (!name) return;
                
                const type = prompt('Тип (Кабинет/Шкаф/Склад):', 'Кабинет');
                if (!type) return;
                
                const capacity = parseInt(prompt('Вместимость (количество баллонов):', '10'));
                if (isNaN(capacity)) return;
                
                try {
                    await db.collection('storage').add({
                        name: name,
                        type: type,
                        capacity: capacity,
                        createdAt: new Date()
                    });
                    this.showNotification('Хранилище добавлено');
                } catch(e) {
                    this.showNotification('Ошибка', 'error');
                }
            },

            updateStats() {
                const totalCylinders = this.cylinders.length;
                const fullCylinders = this.cylinders.filter(c => c.status === 'Полный').length;
                const emptyCylinders = this.cylinders.filter(c => c.status === 'Пустой').length;
                
                document.getElementById('totalCylinders').innerText = totalCylinders;
                document.getElementById('fullCylinders').innerText = fullCylinders;
                document.getElementById('emptyCylinders').innerText = emptyCylinders;
                document.getElementById('totalStorage').innerText = this.storage.length;
            },

            showNotification(msg, type = 'success') {
                const notif = document.createElement('div');
                notif.className = `notification ${type}`;
                notif.innerText = msg;
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 3000);
            }
        };

        window.App = App;
        window.onload = () => App.init();
    </script>
</body>
</html>
